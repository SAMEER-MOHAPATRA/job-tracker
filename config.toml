[discovery]
max_per_feed = 25

role_keywords = [
    "data analyst",
    "business analyst",
    "data analytics",
    "analytics analyst",
    "reporting analyst",
    "bi analyst",
    "power bi",
    "sql analyst",
    "insights analyst",
    "analytics engineer",
    "sql developer",
    "database analyst",
    "junior data scientist",
    "entry level data scientist",
    "data science intern",
]

seniority_block = [
    "senior",
    "lead",
    "manager",
    "director",
    "sr.",
    "head of",
    "principal",
    "vp ",
    "vice president",
]

[[discovery.feeds]]
label = "RemoteOK | Data"
url = "https://remoteok.com/remote-data-jobs.rss"

[[discovery.feeds]]
label = "RemoteOK | Analyst"
url = "https://remoteok.com/remote-analyst-jobs.rss"

[[discovery.feeds]]
label = "WWR | Programming"
url = "https://weworkremotely.com/categories/remote-programming-jobs.rss"

[[discovery.feeds]]
label = "WWR | All"
url = "https://weworkremotely.com/remote-jobs.rss"

[[discovery.feeds]]
label = "Himalayas | Remote"
url = "https://himalayas.app/jobs/rss"

[[discovery.feeds]]
label = "LinkedIn | DA India"
url = "https://news.google.com/rss/search?q=site%3Alinkedin.com%2Fjobs+%22data+analyst+India%22&hl=en-IN&gl=IN&ceid=IN:en"

[[discovery.feeds]]
label = "LinkedIn | BA India"
url = "https://news.google.com/rss/search?q=site%3Alinkedin.com%2Fjobs+%22business+analyst+India%22&hl=en-IN&gl=IN&ceid=IN:en"

[[discovery.feeds]]
